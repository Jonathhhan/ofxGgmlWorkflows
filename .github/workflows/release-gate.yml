name: reusable-release-gate

on:
  workflow_call:
    inputs:
      require_release_readiness_score:
        type: boolean
        required: false
        default: false
      require_metadata_reconciliation_report:
        type: boolean
        required: false
        default: false
      require_cross_repo_capability_map:
        type: boolean
        required: false
        default: false
      evidence_path:
        type: string
        required: false
        default: build/**/*.json
      require_evidence_file:
        type: boolean
        required: false
        default: false
      require_evidence_schema_valid:
        type: boolean
        required: false
        default: false
      require_current_sha_evidence:
        type: boolean
        required: false
        default: false
      expected_commit_sha:
        type: string
        required: false
        default: ""
      require_fresh_evidence:
        type: boolean
        required: false
        default: false
      max_evidence_age_hours:
        type: string
        required: false
        default: "0"
      required_evidence_backend:
        type: string
        required: false
        default: ""
      required_evidence_result:
        type: string
        required: false
        default: ""
      minimum_certification_level:
        type: string
        required: false
        default: ""
      quality_report_path:
        type: string
        required: false
        default: build/release/release-evidence-quality.md

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Gate summary
        run: |
          echo "Checking release gate reports"
          echo "evidence_path=${{ inputs.evidence_path }}"

      - name: Required reports
        run: |
          missing=0

          check_report() {
            local path="$1"
            local label="$2"
            local required="$3"

            if [ -f "$path" ]; then
              echo "Found $label: $path"
              return
            fi

            if [ "$required" = "true" ]; then
              echo "Missing required $label: $path"
              missing=1
            else
              echo "Missing optional $label: $path"
            fi
          }

          check_report "docs/release-readiness-score.md" "release readiness score" "${{ inputs.require_release_readiness_score }}"
          check_report "docs/metadata-reconciliation-report.md" "metadata reconciliation report" "${{ inputs.require_metadata_reconciliation_report }}"
          check_report "docs/cross-repo-capability-map.md" "cross-repo capability map" "${{ inputs.require_cross_repo_capability_map }}"

          exit "$missing"

      - name: Evidence gate
        shell: bash
        run: |
          python3 scripts/validate-evidence.py \
            --evidence-path "${{ inputs.evidence_path }}" \
            --require-evidence-file "${{ inputs.require_evidence_file }}" \
            --require-schema-valid "${{ inputs.require_evidence_schema_valid }}" \
            --require-current-sha "${{ inputs.require_current_sha_evidence }}" \
            --expected-commit-sha "${{ inputs.expected_commit_sha || github.sha }}" \
            --require-freshness "${{ inputs.require_fresh_evidence }}" \
            --max-evidence-age-hours "${{ inputs.max_evidence_age_hours }}" \
            --required-backend "${{ inputs.required_evidence_backend }}" \
            --required-result "${{ inputs.required_evidence_result }}" \
            --minimum-certification-level "${{ inputs.minimum_certification_level }}" \
            --quality-report-path "${{ inputs.quality_report_path }}" \
            --issue-label "Release evidence issues" \
            --advisory-message "Evidence issues are advisory because release evidence gates are disabled."
