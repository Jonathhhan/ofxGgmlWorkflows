name: reusable-release-check

on:
  workflow_call:
    inputs:
      require_addon_config:
        type: boolean
        required: false
        default: true

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release metadata
        run: |
          test -f README.md
          test -f CHANGELOG.md
          if [[ "${{ inputs.require_addon_config }}" == "true" ]]; then
            test -f addon_config.mk
          fi

      - name: Verify docs/scripts
        run: |
          test -d docs
          test -d scripts

      - name: Reject release artifacts
        run: |
          if find . \( -iname "*.gguf" -o -iname "*.dll" -o -iname "*.so" -o -iname "*.dylib" \) | grep -q .; then
            echo "Forbidden release artifact detected"
            exit 1
          fi
