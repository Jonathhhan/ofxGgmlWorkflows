name: reusable-coding-agent-instructions

on:
  workflow_call:
    inputs:
      require_addon_config:
        type: boolean
        required: false
        default: true
      require_scripts:
        type: boolean
        required: false
        default: true

jobs:
  coding-agent-instructions:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify instruction files
        run: |
          test -f HERMES.md
          test -f AGENTS.md
          test -f .github/copilot-instructions.md
          test -f .github/instructions/ofxggml-ecosystem.instructions.md
          grep -q "ofxGgml" HERMES.md
          grep -q "ofxGgml" AGENTS.md
          grep -q "ofxGgml" .github/copilot-instructions.md
          grep -q "ofxGgml" .github/instructions/ofxggml-ecosystem.instructions.md

      - name: Verify validation guidance
        run: |
          if ! grep -Eq "scripts[\\\\/](validate-local|release-candidate|plan-ecosystem)\\.ps1|workflow_call" HERMES.md; then
            echo "HERMES.md must mention validation, ecosystem planning, or workflow_call review guidance"
            exit 1
          fi
          if ! grep -Eq "scripts[\\\\/](validate-local|release-candidate)\\.ps1|workflow_call" AGENTS.md; then
            echo "AGENTS.md must mention validation or workflow_call review guidance"
            exit 1
          fi
          if ! grep -Eq "scripts[\\\\/](validate-local|release-candidate)\\.ps1|workflow_call" .github/copilot-instructions.md; then
            echo "copilot-instructions.md must mention validation or workflow_call review guidance"
            exit 1
          fi
          if ! grep -Eq "scripts[\\\\/](check-ecosystem-readiness|plan-ecosystem|validate-local|release-candidate)\\.ps1|workflow_call" .github/instructions/ofxggml-ecosystem.instructions.md; then
            echo "ofxggml-ecosystem.instructions.md must mention ecosystem readiness, planning, validation, or workflow_call review guidance"
            exit 1
          fi

      - name: Verify ecosystem guardrails
        run: |
          check_pattern() {
            local file="$1"
            local pattern="$2"
            local label="$3"

            if ! grep -Eiq "$pattern" "$file"; then
              echo "$file must mention $label"
              exit 1
            fi
          }

          check_pattern HERMES.md "lane|scope|role" "repository lane or scope"
          check_pattern AGENTS.md "lane|scope|role" "repository lane or scope"
          check_pattern .github/copilot-instructions.md "lane|scope|role" "repository lane or scope"
          check_pattern .github/instructions/ofxggml-ecosystem.instructions.md "lane|scope|role" "repository lane or scope"

          check_pattern HERMES.md "ofxGgmlCore|Core" "Core planning/shared-base ownership"
          check_pattern AGENTS.md "ofxGgmlCore|Core" "Core planning/shared-base ownership"
          check_pattern .github/copilot-instructions.md "ofxGgmlCore|Core" "Core planning/shared-base ownership"
          check_pattern .github/instructions/ofxggml-ecosystem.instructions.md "ofxGgmlCore|Core" "Core planning/shared-base ownership"

          check_pattern HERMES.md "companion" "companion addon boundary"
          check_pattern AGENTS.md "companion" "companion addon boundary"
          check_pattern .github/copilot-instructions.md "companion" "companion addon boundary"
          check_pattern .github/instructions/ofxggml-ecosystem.instructions.md "companion" "companion addon boundary"

          check_pattern HERMES.md "generated|binaries|model|runtime|cache" "generated artifact hygiene"
          check_pattern AGENTS.md "generated|binaries|model|runtime|cache" "generated artifact hygiene"
          check_pattern .github/copilot-instructions.md "generated|binaries|model|runtime|cache" "generated artifact hygiene"
          check_pattern .github/instructions/ofxggml-ecosystem.instructions.md "generated|binaries|model|runtime|cache" "generated artifact hygiene"

          check_pattern HERMES.md "handoff|agent-handoff-contract|plan-ecosystem" "cross-repo handoff or planning guidance"
          check_pattern AGENTS.md "handoff|agent-handoff-contract|plan-ecosystem" "cross-repo handoff or planning guidance"
          check_pattern .github/copilot-instructions.md "handoff|agent-handoff-contract|plan-ecosystem" "cross-repo handoff or planning guidance"
          check_pattern .github/instructions/ofxggml-ecosystem.instructions.md "handoff|agent-handoff-contract|plan-ecosystem" "cross-repo handoff or planning guidance"

      - name: Verify addon repository shape
        if: inputs.require_addon_config
        run: |
          test -f addon_config.mk
          test -d src

      - name: Verify script repository shape
        if: inputs.require_scripts
        run: |
          test -d scripts
