name: reusable-release-readiness-score

on:
  workflow_call:

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate release readiness score
        run: |
          if [ -f scripts/generate-release-readiness-score.py ]; then
            python3 scripts/generate-release-readiness-score.py
          else
            echo "No release readiness generator present"
          fi
