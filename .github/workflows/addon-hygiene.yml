name: reusable-addon-hygiene

on:
  workflow_call:
    inputs:
      require_addon_config:
        type: boolean
        required: false
        default: true
      require_src:
        type: boolean
        required: false
        default: true
      require_examples:
        type: boolean
        required: false
        default: false

jobs:
  hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify addon structure
        if: inputs.require_addon_config || inputs.require_src
        run: |
          if [[ "${{ inputs.require_addon_config }}" == "true" ]]; then
            test -f README.md
            test -f addon_config.mk
          fi
          if [[ "${{ inputs.require_src }}" == "true" ]]; then
            test -d src
          fi

      - name: Verify examples
        if: inputs.require_examples
        run: |
          if ! find . -maxdepth 2 -type d \( -name "examples" -o -name "example*" \) | grep -q .; then
            echo "No examples found. Expected a top-level examples/ or example* directory."
            exit 1
          fi

      - name: Verify governance files
        run: |
          test -f AGENTS.md
          test -f .github/copilot-instructions.md

      - name: Reject generated artifacts
        run: |
          if find . \( -iname "*.gguf" -o -iname "*.dll" -o -iname "*.so" -o -iname "*.dylib" -o -iname "*.exe" \) | grep -q .; then
            echo "Forbidden artifact detected"
            exit 1
          fi
