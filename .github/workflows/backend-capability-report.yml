name: reusable-backend-capability-report

on:
  workflow_call:
    inputs:
      require_generator:
        type: boolean
        default: false
      require_report_artifact:
        type: boolean
        default: false
      report_artifact_path:
        type: string
        default: docs/backend-capability-report.md

jobs:
  backend-capability-report:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate backend capability report
        run: |
          if [ -f scripts/generate-backend-capability-report.py ]; then
            python3 scripts/generate-backend-capability-report.py
          elif [ "${{ inputs.require_generator }}" = "true" ]; then
            echo "Missing backend capability report generator: scripts/generate-backend-capability-report.py"
            exit 1
          else
            echo "No backend capability report generator present"
          fi

      - name: Verify backend capability report
        run: |
          if [ -f "${{ inputs.report_artifact_path }}" ]; then
            echo "Found backend capability report: ${{ inputs.report_artifact_path }}"
          elif [ "${{ inputs.require_report_artifact }}" = "true" ]; then
            echo "Missing backend capability report: ${{ inputs.report_artifact_path }}"
            exit 1
          else
            echo "No backend capability report artifact present"
          fi
