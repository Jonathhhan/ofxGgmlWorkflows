name: reusable-backend-runtime-check

on:
  workflow_call:

jobs:
  backend-runtime-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment info
        shell: bash
        run: |
          echo "Runner: $RUNNER_OS"
          echo "Backend runtime verification scaffold"

      - name: CPU backend placeholder
        shell: bash
        run: |
          echo "Future CPU backend initialization test"

      - name: CUDA backend placeholder
        shell: bash
        run: |
          echo "Future CUDA runtime discovery"

      - name: Metal backend placeholder
        shell: bash
        run: |
          echo "Future Metal runtime discovery"

      - name: Vulkan backend placeholder
        shell: bash
        run: |
          echo "Future Vulkan runtime discovery"
