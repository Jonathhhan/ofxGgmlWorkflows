name: reusable-backend-runtime-check

on:
  workflow_call:
    inputs:
      require_cuda:
        type: boolean
        default: false
      require_metal:
        type: boolean
        default: false
      require_vulkan:
        type: boolean
        default: false
      require_runtime_smoke_source:
        type: boolean
        default: false
      require_linux_runtime_smoke_script:
        type: boolean
        default: false
      require_windows_runtime_smoke_scripts:
        type: boolean
        default: false
      require_macos_runtime_smoke_script:
        type: boolean
        default: false
      require_backend_runtime_smoke_evidence:
        type: boolean
        default: false
      backend_runtime_smoke_evidence_path:
        type: string
        default: build/runtime-smoke/backend-runtime-smoke.json

jobs:
  backend-runtime-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment info
        shell: bash
        run: |
          echo "Runner: $RUNNER_OS"
          echo "Backend runtime verification"
          echo "require_cuda=${{ inputs.require_cuda }}"
          echo "require_metal=${{ inputs.require_metal }}"
          echo "require_vulkan=${{ inputs.require_vulkan }}"
          echo "require_runtime_smoke_source=${{ inputs.require_runtime_smoke_source }}"
          echo "require_backend_runtime_smoke_evidence=${{ inputs.require_backend_runtime_smoke_evidence }}"
          echo "backend_runtime_smoke_evidence_path=${{ inputs.backend_runtime_smoke_evidence_path }}"

      - name: Verify runtime smoke source exists
        shell: bash
        run: |
          if [ -f tools/runtime-smoke/runtime_smoke.cpp ]; then
            echo "Found runtime smoke source"
          elif [ "${{ inputs.require_runtime_smoke_source }}" = "true" ]; then
            echo "Runtime smoke source missing: tools/runtime-smoke/runtime_smoke.cpp"
            exit 1
          else
            echo "Runtime smoke source missing; skipping source requirement"
          fi

      - name: Linux CPU runtime smoke execution
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          if [ ! -f scripts/ci-setup-runtime-smoke.sh ]; then
            if [ "${{ inputs.require_linux_runtime_smoke_script }}" = "true" ]; then
              echo "Linux runtime smoke setup script missing: scripts/ci-setup-runtime-smoke.sh"
              exit 1
            fi
            echo "Linux runtime smoke setup script is not present in this repository; skipping."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y powershell build-essential cmake
          chmod +x scripts/ci-setup-runtime-smoke.sh
          scripts/ci-setup-runtime-smoke.sh

      - name: Windows CPU runtime smoke execution
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (!(Test-Path -LiteralPath "scripts\setup-ggml.ps1") -or !(Test-Path -LiteralPath "scripts\build-runtime-smoke.ps1")) {
            if ("${{ inputs.require_windows_runtime_smoke_scripts }}" -eq "true") {
              Write-Error "Windows runtime smoke scripts are required but missing: scripts\setup-ggml.ps1 and scripts\build-runtime-smoke.ps1"
              exit 1
            }
            Write-Host "Windows runtime smoke scripts are not present in this repository; skipping."
            exit 0
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\setup-ggml.ps1 -CpuOnly -Jobs 2
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-runtime-smoke.ps1 -Backend cpu -RequireBackend

      - name: macOS CPU runtime smoke execution
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ ! -f scripts/ci-setup-runtime-smoke.sh ]; then
            if [ "${{ inputs.require_macos_runtime_smoke_script }}" = "true" ]; then
              echo "macOS runtime smoke setup script missing: scripts/ci-setup-runtime-smoke.sh"
              exit 1
            fi
            echo "macOS runtime smoke setup script is not present in this repository; skipping."
            exit 0
          fi
          chmod +x scripts/ci-setup-runtime-smoke.sh
          scripts/ci-setup-runtime-smoke.sh

      - name: Verify backend runtime smoke evidence
        if: always()
        shell: bash
        run: |
          if [ -f "${{ inputs.backend_runtime_smoke_evidence_path }}" ]; then
            echo "Found backend runtime smoke evidence: ${{ inputs.backend_runtime_smoke_evidence_path }}"
          elif [ "${{ inputs.require_backend_runtime_smoke_evidence }}" = "true" ]; then
            echo "Missing backend runtime smoke evidence: ${{ inputs.backend_runtime_smoke_evidence_path }}"
            exit 1
          else
            echo "Backend runtime smoke evidence missing; skipping evidence requirement"
          fi

      - name: Upload backend runtime smoke evidence
        id: upload-backend-runtime-smoke
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: backend-runtime-smoke-${{ matrix.os }}
          path: ${{ inputs.backend_runtime_smoke_evidence_path }}
          if-no-files-found: ignore

      - name: CUDA runtime truth semantics
        shell: bash
        run: |
          echo "CUDA runtime truth requires a CUDA-enabled runner and ggml CUDA build."
          if [ "${{ inputs.require_cuda }}" = "true" ]; then
            echo "CUDA is required for this run. Certification must execute: runtime_smoke --backend cuda --require-backend"
          else
            echo "CUDA is optional for this run. Certification may execute: runtime_smoke --backend cuda"
          fi

      - name: Metal runtime truth semantics
        shell: bash
        run: |
          echo "Metal runtime truth requires macOS runner plus ggml Metal build."
          if [ "${{ inputs.require_metal }}" = "true" ]; then
            echo "Metal is required for this run. Certification must execute: runtime_smoke --backend metal --require-backend"
          else
            echo "Metal is optional for this run. Certification may execute: runtime_smoke --backend metal"
          fi

      - name: Vulkan runtime truth semantics
        shell: bash
        run: |
          echo "Vulkan runtime truth requires Vulkan loader/device availability plus ggml Vulkan build."
          if [ "${{ inputs.require_vulkan }}" = "true" ]; then
            echo "Vulkan is required for this run. Certification must execute: runtime_smoke --backend vulkan --require-backend"
          else
            echo "Vulkan is optional for this run. Certification may execute: runtime_smoke --backend vulkan"
          fi
