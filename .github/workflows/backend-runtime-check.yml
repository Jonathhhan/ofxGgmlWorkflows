name: reusable-backend-runtime-check

on:
  workflow_call:
    inputs:
      require_cuda:
        type: boolean
        default: false
      require_metal:
        type: boolean
        default: false
      require_vulkan:
        type: boolean
        default: false

jobs:
  backend-runtime-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment info
        shell: bash
        run: |
          echo "Runner: $RUNNER_OS"
          echo "Backend runtime verification"
          echo "require_cuda=${{ inputs.require_cuda }}"
          echo "require_metal=${{ inputs.require_metal }}"
          echo "require_vulkan=${{ inputs.require_vulkan }}"

      - name: Verify runtime smoke source exists
        shell: bash
        run: |
          test -f tools/runtime-smoke/runtime_smoke.cpp || echo "Runtime smoke source missing"

      - name: Linux CPU runtime smoke execution
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell build-essential cmake
          chmod +x scripts/ci-setup-runtime-smoke.sh
          scripts/ci-setup-runtime-smoke.sh

      - name: Windows CPU runtime smoke execution
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (!(Test-Path -LiteralPath "scripts\setup-ggml.ps1") -or !(Test-Path -LiteralPath "scripts\build-runtime-smoke.ps1")) {
            Write-Host "Windows runtime smoke scripts are not present in this repository; skipping."
            exit 0
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\setup-ggml.ps1 -CpuOnly -Jobs 2
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-runtime-smoke.ps1 -Backend cpu -RequireBackend

      - name: macOS runtime smoke scaffold
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "Runtime smoke execution scaffold for $RUNNER_OS"
          echo "Future platform-native ggml bootstrap required"

      - name: Upload backend runtime smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: backend-runtime-smoke-${{ matrix.os }}
          path: build/runtime-smoke/backend-runtime-smoke.json
          if-no-files-found: ignore

      - name: CUDA runtime truth semantics
        shell: bash
        run: |
          echo "CUDA runtime truth requires a CUDA-enabled runner and ggml CUDA build."
          if [ "${{ inputs.require_cuda }}" = "true" ]; then
            echo "CUDA is required for this run. Future step must execute: runtime_smoke --backend cuda --require-backend"
          else
            echo "CUDA is optional for this run. Future step may execute: runtime_smoke --backend cuda"
          fi

      - name: Metal runtime truth semantics
        shell: bash
        run: |
          echo "Metal runtime truth requires macOS runner plus ggml Metal build."
          if [ "${{ inputs.require_metal }}" = "true" ]; then
            echo "Metal is required for this run. Future step must execute: runtime_smoke --backend metal --require-backend"
          else
            echo "Metal is optional for this run. Future step may execute: runtime_smoke --backend metal"
          fi

      - name: Vulkan runtime truth semantics
        shell: bash
        run: |
          echo "Vulkan runtime truth requires Vulkan loader/device availability plus ggml Vulkan build."
          if [ "${{ inputs.require_vulkan }}" = "true" ]; then
            echo "Vulkan is required for this run. Future step must execute: runtime_smoke --backend vulkan --require-backend"
          else
            echo "Vulkan is optional for this run. Future step may execute: runtime_smoke --backend vulkan"
          fi
