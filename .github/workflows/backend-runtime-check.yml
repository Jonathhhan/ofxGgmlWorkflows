name: reusable-backend-runtime-check

on:
  workflow_call:

jobs:
  backend-runtime-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment info
        shell: bash
        run: |
          echo "Runner: $RUNNER_OS"
          echo "Backend runtime verification scaffold"

      - name: Verify runtime smoke source exists
        shell: bash
        run: |
          test -f tools/runtime-smoke/runtime_smoke.cpp || echo "Runtime smoke source missing"

      - name: CPU runtime smoke placeholder
        shell: bash
        run: |
          echo "Future CPU runtime smoke build/run"
          echo "Expected invocation: runtime_smoke --backend cpu --require-backend"

      - name: CUDA runtime smoke placeholder
        shell: bash
        run: |
          echo "Future CUDA runtime discovery"
          echo "Expected invocation: runtime_smoke --backend cuda"

      - name: Metal runtime smoke placeholder
        shell: bash
        run: |
          echo "Future Metal runtime discovery"
          echo "Expected invocation: runtime_smoke --backend metal"

      - name: Vulkan runtime smoke placeholder
        shell: bash
        run: |
          echo "Future Vulkan runtime discovery"
          echo "Expected invocation: runtime_smoke --backend vulkan"
