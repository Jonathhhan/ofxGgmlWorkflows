name: reusable-baseline-compatibility

on:
  workflow_call:

jobs:
  baseline-compatibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check baseline compatibility
        run: |
          if [ -f scripts/check-baseline-compatibility.py ]; then
            python3 scripts/check-baseline-compatibility.py
          else
            echo "No compatibility checker present"
          fi
