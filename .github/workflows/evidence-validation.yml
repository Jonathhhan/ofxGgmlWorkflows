name: reusable-evidence-validation

on:
  workflow_call:
    inputs:
      evidence_path:
        type: string
        required: false
        default: build/**/*.json
      evidence_profile:
        type: string
        required: false
        default: custom
      require_evidence_file:
        type: boolean
        required: false
        default: false
      require_schema_valid:
        type: boolean
        required: false
        default: false
      allowed_schema_versions:
        type: string
        required: false
        default: "1"
      require_current_sha:
        type: boolean
        required: false
        default: false
      expected_commit_sha:
        type: string
        required: false
        default: ""
      require_freshness:
        type: boolean
        required: false
        default: false
      max_evidence_age_hours:
        type: string
        required: false
        default: "0"
      required_backend:
        type: string
        required: false
        default: ""
      required_result:
        type: string
        required: false
        default: ""
      minimum_certification_level:
        type: string
        required: false
        default: ""
      quality_report_path:
        type: string
        required: false
        default: build/evidence/evidence-quality.md
      upload_evidence:
        type: boolean
        required: false
        default: true
      artifact_name:
        type: string
        required: false
        default: ofxggml-evidence
    outputs:
      artifact_digest:
        description: SHA-256 digest emitted by actions/upload-artifact for the evidence bundle.
        value: ${{ jobs.evidence-validation.outputs.artifact_digest }}

jobs:
  evidence-validation:
    runs-on: ubuntu-latest
    outputs:
      artifact_digest: ${{ steps.upload-evidence.outputs.artifact-digest }}

    permissions:
      contents: read

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6

      - name: Checkout workflow tools
        uses: actions/checkout@v6
        with:
          repository: Jonathhhan/ofxGgmlWorkflows
          ref: ${{ github.workflow_sha }}
          path: .ofxggml-workflows

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate evidence schema
        shell: bash
        run: |
          require_evidence_file="${{ inputs.require_evidence_file }}"
          require_schema_valid="${{ inputs.require_schema_valid }}"
          require_current_sha="${{ inputs.require_current_sha }}"
          require_freshness="${{ inputs.require_freshness }}"

          case "${{ inputs.evidence_profile }}" in
            custom)
              ;;
            advisory)
              require_evidence_file=false
              require_schema_valid=false
              require_current_sha=false
              require_freshness=false
              ;;
            schema)
              require_evidence_file=true
              require_schema_valid=true
              require_current_sha=false
              require_freshness=false
              ;;
            current-sha)
              require_evidence_file=true
              require_schema_valid=true
              require_current_sha=true
              require_freshness=false
              ;;
            fresh-current-sha|certification|release)
              require_evidence_file=true
              require_schema_valid=true
              require_current_sha=true
              require_freshness=true
              ;;
            *)
              echo "Unsupported evidence_profile: ${{ inputs.evidence_profile }}"
              echo "Allowed values: custom, advisory, schema, current-sha, fresh-current-sha, certification, release"
              exit 1
              ;;
          esac

          echo "evidence_profile=${{ inputs.evidence_profile }}"
          echo "resolved_require_evidence_file=${require_evidence_file}"
          echo "resolved_require_schema_valid=${require_schema_valid}"
          echo "resolved_require_current_sha=${require_current_sha}"
          echo "resolved_require_freshness=${require_freshness}"

          python3 .ofxggml-workflows/scripts/validate-evidence.py \
            --evidence-path "${{ inputs.evidence_path }}" \
            --require-evidence-file "${require_evidence_file}" \
            --require-schema-valid "${require_schema_valid}" \
            --allowed-schema-versions "${{ inputs.allowed_schema_versions }}" \
            --require-current-sha "${require_current_sha}" \
            --expected-commit-sha "${{ inputs.expected_commit_sha || github.sha }}" \
            --require-freshness "${require_freshness}" \
            --max-evidence-age-hours "${{ inputs.max_evidence_age_hours }}" \
            --required-backend "${{ inputs.required_backend }}" \
            --required-result "${{ inputs.required_result }}" \
            --minimum-certification-level "${{ inputs.minimum_certification_level }}" \
            --quality-report-path "${{ inputs.quality_report_path }}"

      - name: Upload evidence
        id: upload-evidence
        if: always() && inputs.upload_evidence
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ inputs.evidence_path }}
            ${{ inputs.quality_report_path }}
          if-no-files-found: ignore
