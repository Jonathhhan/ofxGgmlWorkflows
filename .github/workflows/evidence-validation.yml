name: reusable-evidence-validation

on:
  workflow_call:
    inputs:
      evidence_path:
        type: string
        required: false
        default: build/**/*.json
      require_evidence_file:
        type: boolean
        required: false
        default: false
      require_schema_valid:
        type: boolean
        required: false
        default: false
      allowed_schema_versions:
        type: string
        required: false
        default: "1"
      require_current_sha:
        type: boolean
        required: false
        default: false
      expected_commit_sha:
        type: string
        required: false
        default: ""
      require_freshness:
        type: boolean
        required: false
        default: false
      max_evidence_age_hours:
        type: string
        required: false
        default: "0"
      required_backend:
        type: string
        required: false
        default: ""
      required_result:
        type: string
        required: false
        default: ""
      minimum_certification_level:
        type: string
        required: false
        default: ""
      quality_report_path:
        type: string
        required: false
        default: build/evidence/evidence-quality.md
      upload_evidence:
        type: boolean
        required: false
        default: true
      artifact_name:
        type: string
        required: false
        default: ofxggml-evidence

jobs:
  evidence-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate evidence schema
        shell: bash
        run: |
          python3 scripts/validate-evidence.py \
            --evidence-path "${{ inputs.evidence_path }}" \
            --require-evidence-file "${{ inputs.require_evidence_file }}" \
            --require-schema-valid "${{ inputs.require_schema_valid }}" \
            --allowed-schema-versions "${{ inputs.allowed_schema_versions }}" \
            --require-current-sha "${{ inputs.require_current_sha }}" \
            --expected-commit-sha "${{ inputs.expected_commit_sha || github.sha }}" \
            --require-freshness "${{ inputs.require_freshness }}" \
            --max-evidence-age-hours "${{ inputs.max_evidence_age_hours }}" \
            --required-backend "${{ inputs.required_backend }}" \
            --required-result "${{ inputs.required_result }}" \
            --minimum-certification-level "${{ inputs.minimum_certification_level }}" \
            --quality-report-path "${{ inputs.quality_report_path }}"

      - name: Upload evidence
        if: always() && inputs.upload_evidence
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ inputs.evidence_path }}
            ${{ inputs.quality_report_path }}
          if-no-files-found: ignore
